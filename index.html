<!-- Draggable, resized and purple tawk.to widget -->
<script type="text/javascript">
  window.addEventListener('load', function () {
    var interval = setInterval(function () {
      var widget = document.querySelector('#tawkchat-minified-container') ||
                   document.querySelector('[id^="tawkchat"]') ||
                   document.querySelector('#chat-widget-container');

      if (widget) {
        clearInterval(interval);

        // =============================================
        // ADD YOUR TAWK.TO DIRECT CHAT LINK HERE
        var tawkDirectLink = 'https://tawk.to/chat/6a2187aa4a36f41c2edf040c/';
        // =============================================

        widget.addEventListener('click', function () {
          window.open(tawkDirectLink, '_blank');
        });

        // Initial position (top-right, slightly above middle)
        widget.style.position = 'fixed';
        widget.style.bottom = 'auto';
        widget.style.top = '40%';
        widget.style.right = '10px';
        widget.style.left = 'auto';
        widget.style.cursor = 'grab';
        widget.style.zIndex = '9999';

        // Resize
        widget.style.transform = 'scale(0.75) translateY(-50%)';
        widget.style.transformOrigin = 'top right';

        // Recolor to purple
        var styleTag = document.createElement('style');
        styleTag.innerHTML = `
          #tawkchat-minified-container iframe,
          [id^="tawkchat"] iframe {
            filter: hue-rotate(200deg) saturate(2) !important;
          }
        `;
        document.head.appendChild(styleTag);

        // Drag logic
        var isDragging = false;
        var offsetX, offsetY;

        // Touch drag (mobile)
        widget.addEventListener('touchstart', function (e) {
          isDragging = true;
          var touch = e.touches[0];
          var rect = widget.getBoundingClientRect();
          offsetX = touch.clientX - rect.left;
          offsetY = touch.clientY - rect.top;
          widget.style.transform = 'scale(0.75)';
          widget.style.cursor = 'grabbing';
        });

        document.addEventListener('touchmove', function (e) {
          if (!isDragging) return;
          e.preventDefault();
          var touch = e.touches[0];
          widget.style.top = (touch.clientY - offsetY) + 'px';
          widget.style.left = (touch.clientX - offsetX) + 'px';
          widget.style.right = 'auto';
          widget.style.bottom = 'auto';
        }, { passive: false });

        document.addEventListener('touchend', function () {
          isDragging = false;
          widget.style.cursor = 'grab';
        });

        // Mouse drag (desktop)
        widget.addEventListener('mousedown', function (e) {
          isDragging = true;
          var rect = widget.getBoundingClientRect();
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;
          widget.style.transform = 'scale(0.75)';
          widget.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', function (e) {
          if (!isDragging) return;
          widget.style.top = (e.clientY - offsetY) + 'px';
          widget.style.left = (e.clientX - offsetX) + 'px';
          widget.style.right = 'auto';
          widget.style.bottom = 'auto';
        });

        document.addEventListener('mouseup', function () {
          isDragging = false;
          widget.style.cursor = 'grab';
        });
      }
    }, 500);
  });
</script>
