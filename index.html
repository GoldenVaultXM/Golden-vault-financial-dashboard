<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>

    <!--Start of Tawk.to Script-->
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),
    s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://tawk.to/chat/6a2187aa4a36f41c2edf040c/default';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    Tawk_API.onLoad=function(){ Tawk_API.hideWidget(); };
    })();
    </script>
    <!--End of Tawk.to Script-->

    <!-- Draggable Chat Button -->
    <div id="chat-btn" onclick="Tawk_API.toggle()"
    style="position:fixed;width:50px;height:50px;
    border-radius:50%;background:#FFD700;
    bottom:20px;right:20px;cursor:pointer;
    z-index:9999;display:flex;align-items:center;
    justify-content:center;font-size:24px;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);">
    💬
    </div>

    <script>
    const btn=document.getElementById('chat-btn');
    let isDragging=false;
    btn.addEventListener('mousedown',()=>isDragging=true);
    document.addEventListener('mouseup',()=>isDragging=false);
    document.addEventListener('mousemove',(e)=>{
      if(isDragging){
        btn.style.left=e.clientX-25+'px';
        btn.style.top=e.clientY-25+'px';
        btn.style.right='auto';
        btn.style.bottom='auto';
      }
    });
    </script>

  </body>
</html>
